# /usr/lib/modprobe.d/xmm7360.conf
#
# The iosm driver claims the same PCI device (Intel XMM7360).
# Blacklist it so xmm7360 is the only driver that binds.
blacklist iosm

# xmm7360 autoloads via its MODULE_DEVICE_TABLE(pci, ...) entry once iosm
# is out of the way -- no softdep needed. (A previous softdep line keyed on
# "intel-xmm7360", which is not a real module name and matched nothing.)
