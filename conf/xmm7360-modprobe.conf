# /usr/lib/modprobe.d/xmm7360.conf
#
# The iosm driver claims the same PCI device (Intel XMM7360).
# Blacklist it so xmm7360 is the only driver that binds.
blacklist iosm

# Soft-dep: load xmm7360 when the XMM7360 PCI device is detected.
# (The module already has a MODULE_DEVICE_TABLE entry for the PCI ID;
# this is a belt-and-braces fallback for older udev.)
softdep intel-xmm7360 pre: xmm7360
