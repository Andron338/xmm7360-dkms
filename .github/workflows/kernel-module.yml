name: kernel-module

# Build xmm7360.ko inside a real Arch container against the official Arch
# kernel header packages: linux-lts and linux-hardened (both in 'extra',
# fast + reliable). linux-rt headers live in the AUR, so that variant is
# best-effort (continue-on-error) — a flaky/slow AUR build never blocks CI.

on:
  push:
    paths:
      - 'xmm7360.c'
      - 'Makefile'
      - '.github/workflows/kernel-module.yml'
  pull_request:
    paths:
      - 'xmm7360.c'
      - 'Makefile'
  workflow_dispatch:

jobs:
  # ── Official kernels (linux-lts, linux-hardened) ────────────────────────
  build-official:
    name: build against ${{ matrix.headers }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    strategy:
      fail-fast: false
      matrix:
        headers:
          - linux-lts-headers
          - linux-hardened-headers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync and install kernel headers
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel bc kmod ${{ matrix.headers }}

      - name: Resolve kernel version dir
        id: kver
        run: |
          case "${{ matrix.headers }}" in
            linux-lts-headers)      tag='-lts' ;;
            linux-hardened-headers) tag='-hardened' ;;
            *)                      tag='' ;;
          esac
          KVER=$(ls -1 /usr/lib/modules/ | grep -- "$tag" | sort -V | tail -1)
          if [ -z "$KVER" ]; then
            echo "::error::no module dir found for ${{ matrix.headers }}"
            ls -la /usr/lib/modules/ || true
            exit 1
          fi
          echo "kver=$KVER" >> "$GITHUB_OUTPUT"
          echo "Building against $KVER"
          test -d "/usr/lib/modules/$KVER/build"

      - name: Build module
        run: |
          make KVERSION=${{ steps.kver.outputs.kver }} 2>&1 | tee build.log
          test -f xmm7360.ko || { echo "::error::xmm7360.ko not produced"; exit 1; }

      - name: modinfo sanity
        run: |
          modinfo xmm7360.ko | tee modinfo.txt
          grep -q 'license:.*GPL' modinfo.txt \
            || { echo "::error::module missing GPL license"; exit 1; }

      - name: Surface unexpected warnings
        run: |
          if grep -E 'warning:' build.log \
             | grep -vE 'multi-character|missing-prototype|Wcomment'; then
            echo "::warning::Unexpected compiler warnings (see build.log)"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-${{ steps.kver.outputs.kver }}
          path: |
            xmm7360.ko
            build.log
            modinfo.txt
          retention-days: 14

  # ── Realtime kernel (AUR, best-effort) ──────────────────────────────────
  build-rt:
    name: build against linux-rt (AUR, best-effort)
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    continue-on-error: true   # AUR builds are slow/flaky; never block CI
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Base tooling
        run: |
          pacman -Syu --noconfirm --needed base-devel bc kmod git sudo

      - name: Build + install linux-rt-headers from AUR
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          sudo -u builder bash -c '
            cd /home/builder
            git clone --depth 1 https://aur.archlinux.org/linux-rt.git
            cd linux-rt
            makepkg -s --noconfirm --nocheck
          '
          pacman -U --noconfirm /home/builder/linux-rt/*headers*.pkg.tar.*

      - name: Resolve kernel version dir
        id: kver
        run: |
          KVER=$(ls -1 /usr/lib/modules/ | grep -- '-rt' | sort -V | tail -1)
          test -n "$KVER" || { echo "::error::no -rt module dir"; exit 1; }
          echo "kver=$KVER" >> "$GITHUB_OUTPUT"

      - name: Build module
        run: |
          make KVERSION=${{ steps.kver.outputs.kver }} 2>&1 | tee build-rt.log
          test -f xmm7360.ko || { echo "::error::xmm7360.ko not produced"; exit 1; }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-rt
          path: |
            xmm7360.ko
            build-rt.log
          retention-days: 14
