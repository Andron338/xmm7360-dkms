name: Arch PKGBUILD CI

on:
  push:
    paths:
      - 'PKGBUILD'
      - 'kernel/**'
      - 'tool/**'
      - '*.install'
      - 'dkms.conf'
      - '.github/workflows/**'
  pull_request:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # Stage 1: Build + lint package
  # ─────────────────────────────────────────────────────────────
  package:
    name: makepkg + namcap
    runs-on: ubuntu-latest

    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            git \
            sudo \
            namcap \
            shellcheck \
            dkms \
            pkgconf \
            openssl \
            util-linux \
            modemmanager \
            networkmanager \
            psmisc

      - name: Create builder user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder

          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Run namcap
        run: |
          cd "$GITHUB_WORKSPACE"

          namcap PKGBUILD 2>&1 | tee namcap.log || true

      - name: Shellcheck scripts
        run: |
          cd "$GITHUB_WORKSPACE"

          for f in *.install xmm7360-reset; do
            [ -f "$f" ] || continue

            echo "Checking $f"

            shellcheck -s bash -S warning "$f" || true
          done

      - name: Build package
        run: |
          cd "$GITHUB_WORKSPACE"

          sudo -u builder bash -c '
            makepkg -sf --noconfirm --nocheck
          ' 2>&1 | tee makepkg.log

          ls -la *.pkg.tar.* || {
            echo "::error::No package produced"
            exit 1
          }

      - name: Inspect package contents
        run: |
          cd "$GITHUB_WORKSPACE"

          for p in *.pkg.tar.*; do
            echo "=== $p ==="

            tar -tf "$p" \
              | grep -vE "^\.(MTREE|PKGINFO|BUILDINFO)$" \
              | sort
          done

      - name: Upload package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: |
            *.pkg.tar.*
            *.log
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # Stage 2: DKMS kernel compile tests
  # ─────────────────────────────────────────────────────────────
  dkms-build:
    name: dkms build (${{ matrix.kernel }})
    runs-on: ubuntu-latest

    container:
      image: archlinux:base-devel

    timeout-minutes: 45

    strategy:
      fail-fast: false

      matrix:
        kernel:
          - linux
          - linux-lts
          - linux-zen
          - linux-hardened

    env:
      KPKG: ${{ matrix.kernel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            bc \
            kmod \
            git \
            sudo \
            dkms

      - name: Install kernel + headers
        run: |
          pacman -S --noconfirm --needed \
            "${KPKG}" \
            "${KPKG}-headers"

      - name: Detect kernel version
        id: kver
        run: |
          echo "Installed modules:"
          ls -1 /usr/lib/modules/

          case "$KPKG" in
            linux)
              KVER=$(find /usr/lib/modules -maxdepth 1 -type d \
                | grep -E '[0-9].*-arch[0-9-]*$' \
                | xargs -n1 basename \
                | sort -V \
                | tail -1)
              ;;

            linux-lts)
              KVER=$(find /usr/lib/modules -maxdepth 1 -type d \
                | grep lts \
                | xargs -n1 basename \
                | sort -V \
                | tail -1)
              ;;

            linux-zen)
              KVER=$(find /usr/lib/modules -maxdepth 1 -type d \
                | grep zen \
                | xargs -n1 basename \
                | sort -V \
                | tail -1)
              ;;

            linux-hardened)
              KVER=$(find /usr/lib/modules -maxdepth 1 -type d \
                | grep hardened \
                | xargs -n1 basename \
                | sort -V \
                | tail -1)
              ;;
          esac

          echo "Detected KVER=$KVER"

          if [ -z "$KVER" ]; then
            echo "::error::Could not determine kernel version"
            exit 1
          fi

          if [ ! -d "/usr/lib/modules/$KVER/build" ]; then
            echo "::error::Missing build directory"
            ls -la "/usr/lib/modules/$KVER"
            exit 1
          fi

          echo "kver=$KVER" >> "$GITHUB_OUTPUT"

      - name: Clean old artifacts
        run: |
          rm -f kernel/*.ko || true

          make -C kernel clean || true

      - name: Build module
        run: |
          make -C /usr/lib/modules/${{ steps.kver.outputs.kver }}/build \
            M="$PWD/kernel" \
            modules 2>&1 | tee dkms-build.log

          test -f kernel/xmm7360.ko || {
            echo "::error::Module build failed"
            exit 1
          }

      - name: Verify module
        run: |
          modinfo kernel/xmm7360.ko

          modinfo kernel/xmm7360.ko \
            | grep -qi 'license:.*GPL' || {
              echo "::error::GPL license missing"
              exit 1
            }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dkms-module-${{ matrix.kernel }}
          path: |
            kernel/xmm7360.ko
            dkms-build.log
          retention-days: 14
        
