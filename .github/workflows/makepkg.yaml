name: Arch PKGBUILD CI Matrix

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        kernel: [linux, linux-lts, linux-zen, linux-rt, linux-hardened]
        gcc: [gcc, clang]

    container:
      image: archlinux:latest

    env:
      KERNEL: ${{ matrix.kernel }}
      GCC_PKG: ${{ matrix.gcc }}

    steps:
      # ─────────────────────────────
      # 1. System setup
      # ─────────────────────────────
      - name: Update system and install base tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo

      # ─────────────────────────────
      # 2. Cache pacman packages (speed boost)
      # ─────────────────────────────
      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: pacman-${{ matrix.kernel }}-${{ matrix.gcc }}

      # ─────────────────────────────
      # 3. Install toolchain per matrix
      # ─────────────────────────────
      - name: Install kernel + compiler
        run: |
          pacman -S --noconfirm $GCC_PKG $KERNEL $KERNEL-headers clang

      # ─────────────────────────────
      # 4. Create non-root build user (required by makepkg)
      # ─────────────────────────────
      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      # ─────────────────────────────
      # 5. Checkout repository
      # ─────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ─────────────────────────────
      # 6. Fix permissions for builder user
      # ─────────────────────────────
      - name: Fix permissions
        run: chown -R builder:builder .

      # ─────────────────────────────
      # 7. Export build environment
      # ─────────────────────────────
      - name: Export build variables
        run: |
          echo "export KERNEL_VERSION=$KERNEL" >> /etc/profile
          echo "export CC=$GCC_PKG" >> /etc/profile
          echo "export HOSTCC=$GCC_PKG" >> /etc/profile

      # ─────────────────────────────
      # 8. Build package with makepkg
      # ─────────────────────────────
      - name: Build package
        run: |
          su builder -c "cd $GITHUB_WORKSPACE && makepkg -s --noconfirm"

      # ─────────────────────────────
      # 9. Upload artifacts
      # ─────────────────────────────
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.kernel }}-${{ matrix.gcc }}
          path: "*.pkg.tar.zst"
