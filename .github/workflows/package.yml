name: package

# Lint and build the Arch package in a real Arch container.
# Builds against the LOCAL checkout (not the GitHub remote) by rewriting the
# PKGBUILD git source to a file:// URL pointing at this commit, so CI tests
# exactly what you pushed. No .SRCINFO sync check (you don't maintain one).

on:
  push:
    paths:
      - 'PKGBUILD'
      - 'dkms.conf'
      - 'Makefile.dkms'
      - 'Makefile.tool'
      - '*.install'
      - '.github/workflows/package.yml'
  pull_request:
    paths:
      - 'PKGBUILD'
      - 'dkms.conf'
      - '*.install'
  workflow_dispatch:

jobs:
  lint:
    name: PKGBUILD lint (namcap)
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: pacman -Syu --noconfirm --needed namcap pkgconf

      - name: namcap PKGBUILD
        run: |
          namcap PKGBUILD 2>&1 | tee namcap.log || true
          # Fail only on namcap ERRORS (E:), not warnings.
          if grep -E '^PKGBUILD.* E: ' namcap.log; then
            echo "::error::namcap reported errors"
            exit 1
          fi

      - name: shellcheck install hooks
        run: |
          pacman -S --noconfirm --needed shellcheck
          for f in *.install xmm7360-reset; do
            [ -f "$f" ] || continue
            echo "── $f ──"
            shellcheck -s bash -S warning "$f" || true
          done

      - name: Upload namcap log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: namcap-log
          path: namcap.log
          retention-days: 14

  build:
    name: makepkg (userspace + DKMS source)
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # pkgver() needs full git history

      - name: Install build deps
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git pkgconf openssl util-linux networkmanager \
            modemmanager psmisc dkms

      - name: Prepare local-source build
        run: |
          # makepkg refuses root; create a builder user and hand it the repo.
          useradd -m builder
          cp -a "$GITHUB_WORKSPACE" /home/builder/src
          chown -R builder:builder /home/builder/src
          # git safe.directory so pkgver()'s git calls work for the builder
          sudo -u builder git config --global --add safe.directory /home/builder/src

      - name: Point PKGBUILD at the local checkout
        run: |
          cd /home/builder/src
          # makepkg evaluates the whole PKGBUILD, so a trailing reassignment
          # wins. Override the source to clone from this local checkout instead
          # of GitHub — CI then tests exactly the committed code. pkgver() still
          # works because the clone lands at src/xmm7360-pci as before.
          sudo -u builder tee -a PKGBUILD >/dev/null <<'OVERRIDE'

          # ── CI override: build from local checkout ──
          source=("xmm7360-pci::git+file:///home/builder/src")
          sha256sums=('SKIP')
          OVERRIDE
          echo "── effective source line ──"
          grep -n '^source=' PKGBUILD || true

      - name: makepkg
        run: |
          cd /home/builder/src
          # --nocheck: the DKMS module isn't compiled at package time (it's
          # compiled on the user's machine by DKMS); the kernel-module workflow
          # validates the actual .ko compile.
          sudo -u builder makepkg -sf --noconfirm --nocheck 2>&1 | tee makepkg.log
          ls -la *.pkg.tar.* || { echo "::error::no package produced"; exit 1; }

      - name: Inspect package contents
        run: |
          cd /home/builder/src
          for pkg in *.pkg.tar.*; do
            echo "=== $pkg ==="
            tar -tf "$pkg" | grep -vE '^\.(MTREE|PKGINFO|BUILDINFO)$' | sort
          done

      - name: Upload package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: |
            /home/builder/src/*.pkg.tar.*
            /home/builder/src/makepkg.log
          retention-days: 14
