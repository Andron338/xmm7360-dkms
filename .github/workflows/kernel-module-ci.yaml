name: Kernel Module CI

# Build xmm7360.ko against each Arch kernel's headers.
#   linux, linux-lts, linux-zen, linux-hardened  → official repos (required)
#   linux-rt                                      → AUR only (best-effort)
#
# Notes:
#  * The module Makefile takes a KVERSION override (KDIR = /lib/modules/
#    $(KVERSION)/build). We resolve the real version dir per kernel rather
#    than passing the package name.
#  * No -Werror: the driver has known, accepted multichar / missing-prototype
#    warnings. We surface NEW warnings instead of failing on the old ones.
#  * gcc only: Arch kernels are gcc-built, so out-of-tree clang module builds
#    fail on vermagic/config mismatch. clang coverage lives in rpc-tool.yml
#    for the userspace tool, where it is meaningful.

on:
  push:
    branches: [ main ]
    paths:
      - 'xmm7360.c'
      - 'Makefile'
      - '.github/workflows/kernel-module-ci.yaml'
  pull_request:
    paths:
      - 'xmm7360.c'
      - 'Makefile'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.kernel }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    continue-on-error: ${{ matrix.experimental == true }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        kernel: [linux, linux-lts, linux-zen, linux-hardened]
        include:
          - kernel: linux-rt
            experimental: true

    env:
      KPKG: ${{ matrix.kernel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Base tooling
        run: |
          pacman -Syu --noconfirm --needed base-devel bc kmod git sudo

      - name: Install kernel headers
        run: |
          if [ "$KPKG" = "linux-rt" ]; then
            # linux-rt is AUR-only; build just the headers package as 'builder'.
            useradd -m builder
            echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
            chmod 0440 /etc/sudoers.d/builder
            sudo -u builder bash -c '
              cd /home/builder
              git clone --depth 1 https://aur.archlinux.org/linux-rt.git
              cd linux-rt
              makepkg -s --noconfirm --nocheck
            '
            pacman -U --noconfirm /home/builder/linux-rt/*headers*.pkg.tar.*
          else
            pacman -S --noconfirm --needed "${KPKG}-headers"
          fi

      - name: Resolve kernel version dir
        id: kver
        run: |
          # Map package name -> the /usr/lib/modules suffix it installs under.
          case "$KPKG" in
            linux)          tag='' ;;          # mainline: no suffix
            linux-lts)      tag='-lts' ;;
            linux-zen)      tag='-zen' ;;
            linux-hardened) tag='-hardened' ;;
            linux-rt)       tag='-rt' ;;
          esac
          if [ -z "$tag" ]; then
            # plain 'linux' — pick the dir with no -suffix variant
            KVER=$(ls -1 /usr/lib/modules/ | grep -E '^[0-9].*-arch' | sort -V | tail -1)
          else
            KVER=$(ls -1 /usr/lib/modules/ | grep -- "$tag" | sort -V | tail -1)
          fi
          if [ -z "$KVER" ] || [ ! -d "/usr/lib/modules/$KVER/build" ]; then
            echo "::error::no usable headers for $KPKG"
            ls -la /usr/lib/modules/ || true
            exit 1
          fi
          echo "kver=$KVER" >> "$GITHUB_OUTPUT"
          echo "Building against $KVER"

      - name: Build module
        run: |
          make KVERSION=${{ steps.kver.outputs.kver }} 2>&1 | tee build.log
          test -f xmm7360.ko || { echo "::error::xmm7360.ko not produced"; exit 1; }

      - name: Validate module metadata
        run: |
          modinfo xmm7360.ko | tee modinfo.txt
          grep -q 'license:.*GPL' modinfo.txt \
            || { echo "::error::module missing GPL license"; exit 1; }

      - name: Surface unexpected warnings
        run: |
          # Known/accepted: multichar, missing-prototype, Wcomment.
          if grep -E 'warning:' build.log \
             | grep -vE 'multi-character|missing-prototype|Wcomment'; then
            echo "::warning::Unexpected compiler warnings (see build.log)"
          fi

      - name: Upload module + logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-${{ matrix.kernel }}
          path: |
            xmm7360.ko
            build.log
            modinfo.txt
          retention-days: 14
