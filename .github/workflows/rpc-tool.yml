name: rpc-tool

# Build the userspace open_xdatachannel tool and run the unit test suite
# in a real Arch container. Plain `gcc` (no version pin). No hardware needed.

on:
  push:
    paths:
      - 'rpc/**'
      - 'tests/**'
      - 'Makefile.tool'
      - '.github/workflows/rpc-tool.yml'
  pull_request:
    paths:
      - 'rpc/**'
      - 'tests/**'
      - 'Makefile.tool'
  workflow_dispatch:

jobs:
  build-and-test:
    name: build tool + run tests
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel pkgconf openssl networkmanager util-linux valgrind

      - name: Build tool (gcc)
        working-directory: rpc
        run: |
          make -f ../Makefile.tool clean
          make -f ../Makefile.tool
          test -x open_xdatachannel || { echo "::error::tool not built"; exit 1; }

      - name: Build tool (strict warnings)
        working-directory: rpc
        run: |
          make -f ../Makefile.tool clean
          make -f ../Makefile.tool CFLAGS="-std=c11 -Wall -Wextra -Werror -O2 $(pkg-config --cflags libnm)"

      - name: Run unit tests
        working-directory: tests
        run: |
          make test 2>&1 | tee test-output.log

      - name: Memory check (valgrind)
        working-directory: tests
        run: |
          make clean && make test_proto test_rpc
          valgrind --error-exitcode=1 --leak-check=full \
                   --errors-for-leak-kinds=definite ./test_proto
          valgrind --error-exitcode=1 --leak-check=full \
                   --errors-for-leak-kinds=definite ./test_rpc

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rpc-test-logs
          path: tests/test-output.log
          retention-days: 14

  static-analysis:
    name: cppcheck
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: pacman -Syu --noconfirm --needed cppcheck

      - name: Run cppcheck on rpc/
        run: |
          # Advisory only — warnings do not fail the build.
          cppcheck --enable=warning,portability,performance \
                   --inline-suppr \
                   --suppress=missingIncludeSystem \
                   rpc/ 2>&1 | tee cppcheck.log || true

      - name: Upload cppcheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-log
          path: cppcheck.log
          retention-days: 14
